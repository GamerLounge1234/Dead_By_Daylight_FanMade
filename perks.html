<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBD | Quantum Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap');

        :root {
            /* Survivor Default (Green) */
            --theme-color: #00ff66;
            --theme-glow: rgba(0, 255, 102, 0.5);
            --theme-bg: #030a06;
            --panel-bg: rgba(5, 20, 10, 0.6);
            --border-light: rgba(0, 255, 102, 0.2);
            --text-main: #e0f2e6;
            --text-dim: #6b8f78;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        body.killer-mode {
            /* Killer Theme (Red) */
            --theme-color: #ff003c;
            --theme-glow: rgba(255, 0, 60, 0.5);
            --theme-bg: #0a0303;
            --panel-bg: rgba(20, 5, 5, 0.6);
            --border-light: rgba(255, 0, 60, 0.2);
            --text-main: #f2e0e0;
            --text-dim: #8f6b6b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--theme-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
        }

        /* Animated Grid Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(var(--border-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            opacity: 0.1;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(3);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* --- GLOBAL NAVBAR --- */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--theme-color);
            padding: 1rem 2rem;
            box-shadow: 0 0 20px var(--theme-glow);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-links {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
        }

        .nav-links li a {
            color: var(--text-main);
            text-decoration: none;
            font-family: var(--font-head);
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0; width: 0%; height: 2px;
            background: var(--theme-color);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--theme-color);
        }

        .nav-links li a:hover { color: var(--theme-color); text-shadow: 0 0 10px var(--theme-glow); }
        .nav-links li a:hover::after { width: 100%; }
        /* Active Page Indicator */
        .nav-links li a[href="perks.html"] { color: var(--theme-color); }
        .nav-links li a[href="perks.html"]::after { width: 100%; }

        /* --- MAIN LAYOUT --- */
        .app-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 1.5rem 2rem;
            overflow: hidden;
            gap: 1.5rem;
        }

        /* --- CONTROL DASHBOARD --- */
        .controls-header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(10px);
        }

        .controls-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        /* Faction Toggles */
        .faction-toggle {
            display: flex;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .faction-btn {
            background: transparent;
            color: var(--text-dim);
            border: none;
            padding: 0.8rem 2rem;
            font-family: var(--font-head);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .faction-btn.active {
            background: var(--theme-color);
            color: #000;
            box-shadow: 0 0 15px var(--theme-glow);
        }

        /* Search Engine */
        .search-container {
            flex-grow: 1;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-light);
            color: var(--theme-color);
            padding: 0.8rem 1.5rem;
            font-family: var(--font-body);
            font-size: 1.2rem;
            border-radius: 4px;
            outline: none;
            transition: box-shadow 0.3s;
        }

        .search-bar:focus { box-shadow: 0 0 15px var(--theme-glow); border-color: var(--theme-color); }
        .search-bar::placeholder { color: var(--text-dim); }

        /* Sort Dropdown */
        .sort-dropdown {
            background: rgba(0,0,0,0.5);
            color: var(--theme-color);
            border: 1px solid var(--border-light);
            padding: 0.8rem 1.5rem;
            font-family: var(--font-head);
            font-weight: 700;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .sort-dropdown option { background: #000; color: #fff; }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .category-tabs::-webkit-scrollbar { height: 4px; }
        .category-tabs::-webkit-scrollbar-thumb { background: var(--theme-color); border-radius: 2px; }

        .cat-tab {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-dim);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-family: var(--font-head);
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .cat-tab:hover, .cat-tab.active {
            border-color: var(--theme-color);
            color: var(--theme-color);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 10px var(--theme-glow);
        }

        /* --- CONTENT AREA --- */
        .content-area {
            display: flex;
            gap: 1.5rem;
            height: 100%;
            overflow: hidden;
        }

        /* Left: List */
        .perk-list-container {
            width: 35%;
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .perk-list-container::-webkit-scrollbar { width: 4px; }
        .perk-list-container::-webkit-scrollbar-thumb { background: var(--theme-color); }

        .perk-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .perk-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 0px;
            background: var(--theme-color);
            transition: width 0.2s;
        }

        .perk-card:hover, .perk-card.active { background: rgba(255,255,255,0.05); }
        .perk-card.active::before { width: 4px; box-shadow: 0 0 10px var(--theme-glow); }

        .perk-card-icon {
            width: 50px; height: 50px;
            object-fit: contain;
            filter: grayscale(100%) opacity(0.6);
            transition: all 0.3s;
        }

        .perk-card.active .perk-card-icon, .perk-card:hover .perk-card-icon {
            filter: drop-shadow(0 0 5px var(--theme-color)) grayscale(0%) opacity(1);
        }

        .perk-card-info h3 { font-size: 1.1rem; margin-bottom: 0.2rem; }
        .perk-card-info span { font-size: 0.8rem; color: var(--text-dim); font-family: var(--font-head); }

        /* Right: Display Panel */
        .perk-display-container {
            width: 65%;
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .display-header {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 2rem;
        }

        .display-icon-wrapper {
            position: relative;
            width: 150px; height: 150px;
            display: flex; justify-content: center; align-items: center;
        }

        .display-icon-wrapper::after {
            content: '';
            position: absolute;
            width: 120%; height: 120%;
            border: 1px dashed var(--theme-color);
            border-radius: 50%;
            animation: rotateDash 10s linear infinite;
        }

        @keyframes rotateDash { 100% { transform: rotate(360deg); } }

        #display-icon {
            width: 120px; height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--theme-color));
        }

        .display-title-group h1 {
            font-family: var(--font-head);
            font-size: 3rem;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--theme-glow);
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .meta-tags {
            display: flex; gap: 1rem;
        }

        .meta-tag {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--theme-color);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-family: var(--font-head);
            font-size: 0.8rem;
            color: var(--theme-color);
        }

        .display-desc {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Automated Scenario Module */
        .scenario-box {
            background: rgba(0,0,0,0.7);
            border-left: 4px solid var(--theme-color);
            padding: 1.5rem;
            position: relative;
        }

        .scenario-box::before {
            content: '>> COMBAT SIMULATION';
            display: block;
            font-family: var(--font-head);
            color: var(--theme-color);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
        }

        #display-scenario {
            font-size: 1.1rem;
            color: var(--text-dim);
            font-style: italic;
            line-height: 1.5;
        }

        /* Glitch text effect class */
        .glitch-text { animation: glitch 0.3s linear; }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

    </style>
</head>

        </main>

        function normalize(str) {
    return str
        .toLowerCase()
        .replace(/&/g, 'and')
        .replace(/['’]/g, '')       // remove apostrophes
        .replace(/[^a-z0-9]/g, ''); // remove everything else
}

function fuzzyMatchFilename(perkName) {
    const normalizedPerk = normalize(perkName);

    let match = fileArray.find(file => {
        let fileNorm = normalize(
            file.replace('IconPerks_', '').replace('.webp', '')
        );
        return fileNorm === normalizedPerk;
    });

    // fallback: partial match (stronger)
    if (!match) {
        match = fileArray.find(file => {
            let fileNorm = normalize(
                file.replace('IconPerks_', '').replace('.webp', '')
            );
            return fileNorm.includes(normalizedPerk) || normalizedPerk.includes(fileNorm);
        });
    }

    return match || 'IconPerks_default.webp';
}

        function generateScenario(perk, mode) {
            const isSurv = mode === 'survivor';
            const cat = perk.category;
            const name = perk.name;

            if (isSurv) {
                switch(cat) {
                    case 'SPEED': return `The Killer closes in fast. Just as you are about to take a hit, ${name} activates, giving you the crucial burst of distance needed to reach the next loop safely.`;
                    case 'INFO': return `You are unsure of the enemy's location. Suddenly, ${name} triggers, feeding you tactical telemetry to plan your next rotation entirely undetected.`;
                    case 'HEAL': return `Your team is battered and morale is low. Leveraging ${name}, you rapidly stabilize the situation, turning a near-wipe into a complete reset.`;
                    case 'PROTECT': return `The Killer commits to a deadly lunge. Relying on ${name}, you take the hit, protecting your objective and turning the Killer's aggression into a waste of time.`;
                    case 'STEALTH': return `The terror radius swells. The Killer is actively searching your sector. Thanks to ${name}, your presence is masked, allowing the threat to pass by oblivious.`;
                    case 'OBJECTIVE': return `The trial is at a standstill. You utilize ${name} to break the deadlock, drastically accelerating repair progress and applying immense pressure.`;
                    case 'UTILITY': return `You find yourself in an unpredictable scenario. You adapt on the fly using ${name}, utilizing your environment to gain a distinct mechanical advantage over the trial.`;
                    default: return `In the heat of the trial, utilizing ${name} provides the tactical edge required to outlast the Entity's game.`;
                }
            } else {
                switch(cat) {
                    case 'INFO': return `The prey thinks they are hidden. ${name} reveals their exact position, allowing you to cut off their escape route before they even know you are there.`;
                    case 'SPEED': return `They try to create distance, but ${name} surges your momentum. You close the gap with terrifying speed, leaving them no time to react.`;
                    case 'CHASE': return `A survivor attempts to drop a pallet and buy time. You utilize ${name} to completely negate their defense, ensuring the chase ends swiftly and violently.`;
                    case 'SLOWDOWN': return `The generators are popping too fast. You trigger ${name}, severely crippling the survivors' hope and dragging the trial to a grueling halt.`;
                    case 'GEN': return `You patrol your territory. Finding a progressing generator, ${name} allows you to punish their objective progress and force them into a compromised position.`;
                    case 'TERROR': return `You weaponize fear. Using ${name}, you instill overwhelming panic across the map, forcing the survivors into fatal mistakes.`;
                    case 'EXPOSE': return `A survivor makes a bold play, underestimating your lethality. ${name} triggers, allowing you to instantly down them with a single, devastating blow.`;
                    case 'HEX': return `The survivors remain ignorant of the cursed ground they walk on. The power of ${name} heavily tips the scales in your favor—until they find the totem.`;
                    default: return `You dominate the trial, utilizing ${name} to impose your will and ensure none escape the Entity's grasp.`;
                }
            }
        }

        // --- Render Functions ---

        function renderTabs() {
            const tabContainer = document.getElementById('category-tabs');
            const categories = ['ALL', ...new Set(currentDataset.map(p => p.category))];
            
            tabContainer.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-tab ${cat === activeCategory ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    renderTabs(); // update active class
                    applyFilters();
                };
                tabContainer.appendChild(btn);
            });
        }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const sortVal = document.getElementById('sort-select').value;
            
            let filtered = currentDataset.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query);
                const matchCat = activeCategory === 'ALL' || p.category === activeCategory;
                return matchSearch && matchCat;
            });

            if (sortVal === 'A-Z') {
                filtered.sort((a,b) => a.name.localeCompare(b.name));
            } else if (sortVal === 'Z-A') {
                filtered.sort((a,b) => b.name.localeCompare(a.name));
            } else if (sortVal === 'CATEGORY') {
                filtered.sort((a,b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
            }

            renderList(filtered);
        }

        function renderList(perkArray) {
            const listEl = document.getElementById('perk-list');
            listEl.innerHTML = '';

            if(perkArray.length === 0) {
                listEl.innerHTML = '<div style="padding: 2rem; color: var(--text-dim); text-align: center;">No matching data found in current parameters.</div>';
                return;
            }

            perkArray.forEach((perk, index) => {
                const imgName = fuzzyMatchFilename(perk.name);
                const card = document.createElement('div');
                card.className = 'perk-card';
                card.innerHTML = `
                    <img class="perk-card-icon" src="./DBDperks/${imgName}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><circle cx=\\'50\\' cy=\\'50\\' r=\\'40\\' fill=\\'none\\' stroke=\\'red\\' stroke-width=\\'2\\'/></svg>'">
                    <div class="perk-card-info">
                        <h3>${perk.name}</h3>
                        <span>[${perk.category}]</span>
                    </div>
                `;
                card.onclick = () => activatePerk(perk, imgName, card);
                listEl.appendChild(card);

                // Auto select first entry on load
                if(index === 0) activatePerk(perk, imgName, card);
            });
        }

        function activatePerk(perk, imgName, element) {
            // UI Update
            document.querySelectorAll('.perk-card').forEach(c => c.classList.remove('active'));
            if(element) element.classList.add('active');

            // Glitch Title Effect
            const titleEl = document.getElementById('display-title');
            titleEl.classList.remove('glitch-text');
            void titleEl.offsetWidth; // trigger reflow
            titleEl.classList.add('glitch-text');

            // Populate Panel Data
            document.getElementById('display-icon').src = `./DBDperks/${imgName}`;
            titleEl.innerText = perk.name;
            document.getElementById('meta-cat').innerText = `CLASS: ${perk.category}`;
            document.getElementById('meta-char').innerText = `ORIGIN: ${perk.character}`;
            document.getElementById('display-desc').innerText = perk.desc;
            
            // Generate Scenario
            document.getElementById('display-scenario').innerText = generateScenario(perk, currentMode);
        }

        // --- Event Handlers ---
        
        function setFaction(mode) {
            currentMode = mode;
            currentDataset = mode === 'survivor' ? survivorPerks : killerPerks;
            activeCategory = 'ALL';
            
            // Toggle Body Class for CSS Theme change
            if(mode === 'killer') document.body.classList.add('killer-mode');
            else document.body.classList.remove('killer-mode');

            // Toggle Buttons
            document.getElementById('btn-survivor').classList.toggle('active', mode === 'survivor');
            document.getElementById('btn-killer').classList.toggle('active', mode === 'killer');

            // Reset Inputs
            document.getElementById('search-input').value = '';
            document.getElementById('sort-select').value = 'A-Z';

            renderTabs();
            applyFilters();
        }

        function handleSearch() { applyFilters(); }
        function handleSort() { applyFilters(); }

        // --- Initialization ---
        setFaction('survivor');

    </script>
