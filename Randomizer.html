<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Entity's Terminal - Loadouts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@400;500;700&display=swap');

        :root {
            --bg-void: #050507;
            --entity-blood: #d90429;
            --entity-glow: rgba(217, 4, 41, 0.6);
            --perk-bg: rgba(15, 15, 20, 0.4);
            --glass-bg: rgba(12, 14, 18, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8f9fa;
            --text-muted: #8b949e;
            --neon-accent: #ff2a4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 100VH LOCKED LAYOUT WITH ANIMATED FOG */
        body {
            background-color: var(--bg-void);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Background Effects */
        .ambient-fog {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
            animation: fogDrift 60s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .blood-vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(30, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* PREMIUM GLASSMORPHIC NAVBAR */
        .navbar {
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.2rem 4rem;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.9);
            z-index: 50;
            position: relative;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 3rem;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            padding-bottom: 5px;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 0; height: 2px;
            background: var(--entity-blood);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            box-shadow: 0 0 10px var(--entity-blood);
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .nav-links li a:hover::after, .nav-links li a.active::after {
            width: 100%;
        }

        /* MAIN TWO-COLUMN DASHBOARD */
        .dashboard {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 2rem 5vw;
            gap: 4rem;
            height: calc(100vh - 75px);
            z-index: 10;
            position: relative;
        }

        /* LEFT PANEL: INFO & STRATEGY */
        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5rem;
            height: 100%;
            max-height: 100%;
            animation: fadeSlideRight 0.6s ease-out;
        }

        .build-header {
            border-left: 4px solid var(--neon-accent);
            padding-left: 1.5rem;
            position: relative;
        }
        
        .build-header::before {
            content: ''; position: absolute; top: 0; left: -4px; width: 4px; height: 100%;
            background: var(--neon-accent);
            box-shadow: 0 0 15px var(--neon-accent);
        }

        .build-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            color: #fff;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8), 0 0 20px var(--entity-glow);
        }

        .build-subtitle {
            font-size: 1rem;
            color: var(--neon-accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0.5rem;
        }

        .meta-tags {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 2px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tag span { 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
        }

        /* GLASSMORPHIC SCROLLABLE CONTAINER */
        .strategy-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            overflow-y: auto; 
            flex-grow: 1; /* Takes remaining space dynamically */
            max-height: 50vh; /* Prevents blowing out the 100vh lock */
        }

        /* Custom Blood-Web Scrollbar */
        .strategy-container::-webkit-scrollbar { width: 6px; }
        .strategy-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 8px; }
        .strategy-container::-webkit-scrollbar-thumb { background: var(--entity-blood); border-radius: 8px; box-shadow: 0 0 10px var(--neon-accent); }

        .phase h4 {
            font-family: 'Oswald', sans-serif;
            color: #fff;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.3rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .phase h4::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--text-muted);
            transform: rotate(45deg);
        }

        .phase p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #adb5bd;
            font-weight: 300;
        }

        .pro-tip {
            background: linear-gradient(90deg, rgba(217, 4, 41, 0.15) 0%, rgba(0,0,0,0) 100%);
            border-left: 3px solid var(--entity-blood);
            padding: 1rem;
            font-weight: 400;
            font-size: 0.95rem;
            color: #e9ecef;
            margin-top: auto;
        }
        
        .pro-tip strong {
            color: var(--neon-accent);
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            margin-right: 5px;
        }

        /* RIGHT PANEL: VISUALS */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: fadeSlideLeft 0.6s ease-out;
        }

        /* HUD Rhombus Layout */
        .perk-diamond {
            position: relative;
            width: min(450px, 40vh);
            height: min(450px, 40vh);
            margin-bottom: 3rem;
        }

        .perk-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 250px; 
            height: 120px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .perk-wrapper:hover {
            transform: scale(1.1) !important;
            z-index: 10;
        }

        /* Perfected Diamond Positioning */
        .pos-top { top: -15%; left: 50%; transform: translateX(-50%); flex-direction: column-reverse; }
        .pos-left { top: 50%; left: -30%; transform: translateY(-50%); flex-direction: row-reverse; }
        .pos-right { top: 50%; right: -30%; transform: translateY(-50%); flex-direction: row; }
        .pos-bottom { bottom: -15%; left: 50%; transform: translateX(-50%); flex-direction: column; }

        /* The Perk Diamond Itself */
        .perk-slot {
            width: clamp(80px, 10vh, 110px);
            height: clamp(80px, 10vh, 110px);
            background: linear-gradient(135deg, rgba(30,30,35,0.7) 0%, rgba(10,10,12,0.9) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(0, 0, 0, 0.5);
            transform: rotate(45deg); 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Inner glowing border on hover */
        .perk-wrapper:hover .perk-slot {
            border-color: var(--entity-blood);
            box-shadow: 0 0 30px var(--entity-glow), inset 0 0 20px rgba(217, 4, 41, 0.3);
        }

        .perk-slot img {
            width: 80%;
            height: 80%;
            transform: rotate(-45deg); 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.8));
            transition: filter 0.3s;
            object-fit: contain;
        }

        .perk-wrapper:hover .perk-slot img {
            filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.6));
        }

        .perk-name-label {
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #d1d5db;
            text-transform: uppercase;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            letter-spacing: 2px;
            text-align: center;
            padding: 10px;
            opacity: 0.8;
            transition: all 0.3s;
        }

        .perk-wrapper:hover .perk-name-label {
            color: #fff;
            opacity: 1;
            text-shadow: 0 0 10px var(--neon-accent);
        }

        .pos-top .perk-name-label { margin-bottom: 5px; }
        .pos-bottom .perk-name-label { margin-top: 5px; }
        .pos-left .perk-name-label { margin-right: 10px; text-align: right; }
        .pos-right .perk-name-label { margin-left: 10px; text-align: left; }

        /* AAA RANDOMIZE BUTTON */
        .randomize-btn {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-bottom: 3px solid var(--entity-blood);
            padding: 1rem 4rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .randomize-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(217, 4, 41, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .randomize-btn:hover::before { left: 100%; }
        
        .randomize-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 40px var(--entity-glow); 
            border-color: var(--entity-blood);
            background: rgba(20, 10, 12, 0.9);
        }
        
        .randomize-btn:active { transform: translateY(1px); }

        /* Next Build Icon Line */
        .btn-line {
            width: 30px; height: 2px;
            background: var(--entity-blood);
            box-shadow: 0 0 8px var(--neon-accent);
        }

        /* GLITCH TRANSITION ANIMATION */
        .glitch-flash { animation: entityGlitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

        @keyframes entityGlitch {
            0% { opacity: 1; filter: contrast(1) sepia(0); transform: translate(0); }
            20% { opacity: 0.8; filter: contrast(2) sepia(1) hue-rotate(-50deg); transform: translate(-5px, 2px); }
            40% { opacity: 0.4; filter: contrast(3) invert(0.2); transform: translate(5px, -2px); }
            60% { opacity: 0.9; filter: contrast(1.5) sepia(0.5) hue-rotate(50deg); transform: translate(-2px, 5px); }
            80% { opacity: 0.5; filter: contrast(2) sepia(1) hue-rotate(-50deg); transform: translate(2px, -5px); }
            100% { opacity: 1; filter: contrast(1) sepia(0); transform: translate(0); }
        }

        @keyframes fadeSlideRight { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeSlideLeft { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fogDrift { from { background-position: 0% 0%; } to { background-position: -200% 0%; } }

    </style>
</head>

        let currentBuildIndex = 0;

        function getMatchedImageFile(datasetPerkName) {
            const simplifiedInput = datasetPerkName.toLowerCase().replace(/[^a-z0-9]/g, '');
            for (let i = 0; i < exactIconFiles.length; i++) {
                const fileName = exactIconFiles[i];
                const simplifiedFileName = fileName.toLowerCase().replace('iconperks_', '').replace('.webp', '').replace(/[^a-z0-9]/g, '');
                if (simplifiedInput === simplifiedFileName) {
                    return fileName;
                }
            }
            return "IconPerks_default.webp"; 
        }

        function renderDashboard(build) {
            const dashboard = document.getElementById('main-dashboard');
            const positions = ["pos-top", "pos-left", "pos-right", "pos-bottom"];
            
            let perksHTML = '';
            for (let i = 0; i < 4; i++) {
                const perkName = build.perks[i];
                const fileName = getMatchedImageFile(perkName);
                const posClass = positions[i];
                
                perksHTML += `
                    <div class="perk-wrapper ${posClass}">
                        <div class="perk-slot">
                            <img src="DBDperks/${fileName}" alt="${perkName}" onerror="this.style.display='none'">
                        </div>
                        <div class="perk-name-label">${perkName}</div>
                    </div>
                `;
            }

            const killersText = Array.isArray(build.recommendedKillers) ? build.recommendedKillers.join(', ') : build.recommendedKillers;

            dashboard.innerHTML = `
                <div class="info-panel">
                    <div class="build-header">
                        <h1 class="build-title">${build.name}</h1>
                        <h2 class="build-subtitle">// ${build.subtitle}</h2>
                    </div>

                    <div class="meta-tags">
                        <div class="tag"><span>Archetype:</span> ${build.playstyle}</div>
                        <div class="tag"><span>Execution:</span> ${build.difficulty}</div>
                        <div class="tag"><span>Hosts:</span> ${killersText}</div>
                    </div>

                    <div class="strategy-container">
                        <div class="phase">
                            <h4>Phase I: Opening</h4>
                            <p>${build.strategy.earlyGame}</p>
                        </div>
                        <div class="phase">
                            <h4>Phase II: Escalation</h4>
                            <p>${build.strategy.midGame}</p>
                        </div>
                        <div class="phase">
                            <h4>Phase III: Closure</h4>
                            <p>${build.strategy.endGame}</p>
                        </div>
                        <div class="pro-tip">
                            <strong>ENTITY WHISPERS:</strong> ${build.proTip}
                        </div>
                    </div>
                </div>

                <div class="visual-panel">
                    <div class="perk-diamond">
                        ${perksHTML}
                    </div>
                    <button class="randomize-btn" onclick="executeSequential()">
                        <div class="btn-line"></div>
                        Initialize Next Sequence
                    </button>
                </div>
            `;
        }

        function executeSequential() {
            const dashboard = document.getElementById('main-dashboard');
            
            // Trigger Glitch Re-flow
            dashboard.classList.remove('glitch-flash');
            void dashboard.offsetWidth; 
            dashboard.classList.add('glitch-flash');

            setTimeout(() => {
                currentBuildIndex++;
                if (currentBuildIndex >= buildDatabase.length) {
                    currentBuildIndex = 0;
                }
                renderDashboard(buildDatabase[currentBuildIndex]);
            }, 180);
        }

        window.onload = function() {
            currentBuildIndex = 0;
            renderDashboard(buildDatabase[0]);
        };
    </script>
