<html lang="en">

    <meta charset="UTF-8">

    <title>The Entity's Terminal - Premium Loadouts</title>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@400;500;700&display=swap');

        :root {
            --bg-deep: #05070a;
            --entity-red: #e60026;
            --entity-red-glow: rgba(230, 0, 38, 0.6);
            --perk-blue: #00d4ff;
            --perk-blue-glow: rgba(0, 212, 255, 0.4);
            --perk-blur-bg: rgba(0, 30, 50, 0.4);
            --text-main: #f8f9fa;
            --text-muted: #8b9bb4;
            --glass-bg: rgba(12, 16, 24, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --fog-overlay: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 100VH LOCKED AAA LAYOUT */
        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 70% 30%, rgba(230, 0, 38, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 30% 70%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
                var(--fog-overlay);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* FUTURISTIC GLASS NAVBAR */
        .navbar {
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.9);
            z-index: 100;
        }
        
        .brand {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand::before {
            content: '';
            width: 12px;
            height: 12px;
            background: var(--entity-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--entity-red);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px;
        }
        
        .nav-links li a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            padding-bottom: 5px;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--entity-red);
            transition: 0.3s ease;
            box-shadow: 0 0 8px var(--entity-red-glow);
        }
        
        .nav-links li a:hover, .nav-links li a.active {
            color: white;
        }
        
        .nav-links li a:hover::after, .nav-links li a.active::after {
            width: 100%;
        }

        /* MAIN DASHBOARD - PERFECT GRID */
        .dashboard {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 40px 80px;
            gap: 60px;
            height: calc(100vh - 65px); /* Subtract Navbar Height */
            align-items: center;
        }

        /* LEFT COLUMN: INFORMATION */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
            animation: fadeSlideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            height: 100%;
            justify-content: center;
        }

        .build-header {
            border-left: 5px solid var(--entity-red);
            padding-left: 25px;
            background: linear-gradient(90deg, rgba(230, 0, 38, 0.08) 0%, transparent 80%);
            padding-top: 15px;
            padding-bottom: 15px;
            position: relative;
        }

        .build-title {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            color: white;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            margin-bottom: 8px;
        }

        .build-subtitle {
            font-size: 1.2rem;
            color: var(--entity-red);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--entity-red-glow);
        }

        .meta-tags {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 8px 18px;
            border-radius: 2px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.05);
        }

        .tag span { 
            color: var(--perk-blue); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
        }

        /* GLASSMORPHIC SCROLL CONTAINER */
        .strategy-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow-y: auto; 
            max-height: 45vh; /* Prevents container from breaking 100vh */
        }

        .strategy-container::-webkit-scrollbar { width: 6px; }
        .strategy-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 8px;}
        .strategy-container::-webkit-scrollbar-thumb { background: var(--entity-red); border-radius: 8px; }

        .phase h4 {
            font-family: 'Oswald', sans-serif;
            color: white;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
            margin-bottom: 10px;
            display: inline-block;
            width: 100%;
        }

        .phase h4::before {
            content: '►';
            color: var(--perk-blue);
            font-size: 0.8rem;
            margin-right: 8px;
            vertical-align: middle;
            text-shadow: 0 0 8px var(--perk-blue-glow);
        }

        .phase p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #b0c0d0;
            font-weight: 300;
        }

        .pro-tip {
            background: linear-gradient(135deg, rgba(230, 0, 38, 0.15), rgba(230, 0, 38, 0.05));
            border-left: 3px solid var(--entity-red);
            padding: 15px 20px;
            font-weight: 400;
            font-size: 1.05rem;
            color: #f8f9fa;
            position: relative;
            overflow: hidden;
        }

        .pro-tip strong {
            font-family: 'Oswald', sans-serif;
            letter-spacing: 2px;
            color: var(--entity-red);
            display: block;
            margin-bottom: 5px;
        }

        /* RIGHT COLUMN: VISUAL PANEL */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 100%;
        }

        /* PERFECT BLUE DIAMOND LAYOUT */
        .perk-diamond {
            position: relative;
            width: 450px;
            height: 450px;
            margin-bottom: 50px;
            animation: float 6s ease-in-out infinite;
        }

        .perk-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 160px;
            height: 160px;
        }

        /* Precise Mathematical Positioning */
        .pos-top { top: -20px; left: 50%; transform: translateX(-50%); }
        .pos-left { top: 50%; left: -20px; transform: translateY(-50%); }
        .pos-right { top: 50%; right: -20px; transform: translateY(-50%); }
        .pos-bottom { bottom: -20px; left: 50%; transform: translateX(-50%); }

        .perk-slot {
            width: 120px;
            height: 120px;
            background: var(--perk-blur-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--perk-blue);
            box-shadow: 
                0 0 25px rgba(0, 212, 255, 0.3), 
                inset 0 0 20px rgba(0, 212, 255, 0.2),
                0 0 0 1px rgba(255,255,255,0.1);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .perk-slot::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 1px solid white;
            opacity: 0.2;
            z-index: -1;
        }

        .perk-slot img {
            width: 95px;
            height: 95px;
            transform: rotate(-45deg);
            filter: drop-shadow(0px 0px 12px rgba(255,255,255,0.6));
            transition: all 0.3s ease;
        }

        .perk-slot:hover {
            transform: rotate(45deg) scale(1.08);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6), inset 0 0 25px rgba(0, 212, 255, 0.4);
            border-color: #fff;
        }
        
        .perk-slot:hover img {
            filter: drop-shadow(0px 0px 20px rgba(255,255,255,1));
        }

        /* Label Absolute Positioning to prevent squishing */
        .perk-name-label {
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            position: absolute;
            width: 200px; /* Force wide width for long names */
            text-shadow: 0 2px 5px rgba(0,0,0,1), 0 0 10px var(--perk-blue);
            z-index: 3;
            pointer-events: none;
        }

        .pos-top .perk-name-label { top: -35px; }
        .pos-bottom .perk-name-label { bottom: -35px; }
        .pos-left .perk-name-label { right: 130px; text-align: right; }
        .pos-right .perk-name-label { left: 130px; text-align: left; }

        /* CENTER HUB CONNECTOR */
        .hub-connector {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            border: 1px dashed rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            z-index: 1;
            animation: spin 20s linear infinite;
        }
        
        .hub-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: var(--perk-blue);
            border-radius: 50%;
            box-shadow: 0 0 20px 10px rgba(0, 212, 255, 0.4);
        }

        /* PREMIUM BUTTON */
        .randomize-btn {
            background: rgba(230, 0, 38, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid var(--entity-red);
            padding: 20px 70px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(230, 0, 38, 0.2), inset 0 0 20px rgba(230, 0, 38, 0.2);
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-top: 20px;
        }

        .randomize-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%) skewX(-15deg);
            transition: 0.6s ease;
        }

        .randomize-btn:hover::before { transform: translateX(100%) skewX(-15deg); }
        .randomize-btn:hover {
            background: var(--entity-red);
            box-shadow: 0 15px 40px rgba(230, 0, 38, 0.5), inset 0 0 0 rgba(255,255,255,0);
            transform: translateY(-3px);
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        .randomize-btn:active { transform: translateY(1px); }

        /* UI TRANSITIONS */
        .glitch-flash { animation: screenTear 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

        @keyframes screenTear {
            0% { opacity: 1; filter: contrast(1); transform: translateX(0); }
            20% { opacity: 0.8; filter: contrast(1.5) hue-rotate(-10deg); transform: translateX(-5px); }
            40% { opacity: 0.4; filter: contrast(2) brightness(1.5); transform: translateX(5px); }
            60% { opacity: 0.9; filter: contrast(1.2) hue-rotate(10deg); transform: translateX(-2px); }
            80% { opacity: 0.6; filter: contrast(1.8) brightness(0.8); transform: translateX(2px); }
            100% { opacity: 1; filter: contrast(1); transform: translateX(0); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>

        // Sequence Controller State
        let currentBuildIndex = 0;

        function getMatchedImageFile(datasetPerkName) {
            const simplifiedInput = datasetPerkName.toLowerCase().replace(/[^a-z0-9]/g, '');
            for (let i = 0; i < exactIconFiles.length; i++) {
                const fileName = exactIconFiles[i];
                const simplifiedFileName = fileName.toLowerCase().replace('iconperks_', '').replace('.webp', '').replace(/[^a-z0-9]/g, '');
                if (simplifiedInput === simplifiedFileName) {
                    return fileName;
                }
            }
            return "IconPerks_default.webp"; 
        }

        function renderDashboard(build) {
            const dashboard = document.getElementById('main-dashboard');
            const positions = ["pos-top", "pos-left", "pos-right", "pos-bottom"];
            
            let perksHTML = '';
            for (let i = 0; i < 4; i++) {
                const perkName = build.perks[i] || "Unknown Perk";
                const fileName = getMatchedImageFile(perkName);
                const posClass = positions[i];
                
                perksHTML += `
                    <div class="perk-wrapper ${posClass}">
                        <div class="perk-slot">
                            <img src="DBDperks/${fileName}" alt="${perkName}" onerror="this.src='placeholder.png'; this.style.opacity='0.2';">
                        </div>
                        <div class="perk-name-label">${perkName}</div>
                    </div>
                `;
            }

            const killersText = Array.isArray(build.recommendedKillers) 
                ? build.recommendedKillers.join(', ') 
                : build.recommendedKillers;

            dashboard.innerHTML = `
                <div class="info-panel">
                    <div class="build-header">
                        <h1 class="build-title">${build.name}</h1>
                        <h2 class="build-subtitle">// ${build.subtitle}</h2>
                    </div>

                    <div class="meta-tags">
                        <div class="tag"><span>Playstyle:</span> ${build.playstyle}</div>
                        <div class="tag"><span>Difficulty:</span> ${build.difficulty}</div>
                        <div class="tag"><span>Optimum:</span> ${killersText}</div>
                        <div class="tag" style="border-color: var(--entity-red); background: rgba(230,0,38,0.1);">
                            <span style="color: var(--entity-red);">Sequence:</span> ${currentBuildIndex + 1} / ${buildDatabase.length}
                        </div>
                    </div>

                    <div class="strategy-container">
                        <div class="phase">
                            <h4>Early Game Protocol</h4>
                            <p>${build.strategy.earlyGame}</p>
                        </div>
                        <div class="phase">
                            <h4>Mid Game Escalation</h4>
                            <p>${build.strategy.midGame}</p>
                        </div>
                        <div class="phase">
                            <h4>End Game Execution</h4>
                            <p>${build.strategy.endGame}</p>
                        </div>
                        <div class="pro-tip">
                            <strong>ENTITY WHISPERS</strong>
                            ${build.proTip}
                        </div>
                    </div>
                </div>

                <div class="visual-panel">
                    <div class="perk-diamond">
                        <div class="hub-connector"></div>
                        <div class="hub-core"></div>
                        ${perksHTML}
                    </div>
                    <button class="randomize-btn" onclick="executeSequential()">Initialize Next Build</button>
                </div>
            `;
        }

        // Serialized Algorithm: Runs from 0 to N smoothly, then wraps around
        function executeSequential() {
            const dashboard = document.getElementById('main-dashboard');
            
            // Re-trigger glitch animation
            dashboard.classList.remove('glitch-flash');
            void dashboard.offsetWidth; 
            dashboard.classList.add('glitch-flash');

            // Wait for tear effect to peak before swapping content
            setTimeout(() => {
                currentBuildIndex++;
                
                // If it hits the end of the array (e.g. 500), it safely loops back to 0
                if (currentBuildIndex >= buildDatabase.length) {
                    currentBuildIndex = 0;
                }
                
                renderDashboard(buildDatabase[currentBuildIndex]);
            }, 180);
        }

        // System Boot Sequence
        window.onload = function() {
            currentBuildIndex = 0;
            renderDashboard(buildDatabase[currentBuildIndex]);
        };
    </script>
