<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Entity's Terminal - Premium Loadouts</title>
    <style>
       
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@500;700&display=swap');

        :root {
            --bg-deep: #07090e;
            --entity-red: #d90429;
            --entity-red-glow: rgba(217, 4, 41, 0.4);
            --perk-blur-bg: rgba(0, 180, 216, 0.15); /* The Blur Blue background */
            --perk-border: rgba(0, 180, 216, 0.4);
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --glass-panel: rgba(15, 20, 28, 0.7);
            --fog-overlay: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.05"/></svg>');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 100VH LOCKED LAYOUT */
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 0%, #151a28 0%, var(--bg-deep) 80%), var(--fog-overlay);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* NO SCROLLING */
            display: flex;
            flex-direction: column;
        }

        /* PREMIUM NAVBAR */
        .navbar {
            background: rgba(7, 9, 14, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            padding: 15px 40px;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            z-index: 50;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px;
        }
        .nav-links li a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .nav-links li a:hover, .nav-links li a.active {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* MAIN TWO-COLUMN DASHBOARD */
        .dashboard {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 30px 50px;
            gap: 40px;
            height: calc(100vh - 65px);
        }

      
        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            animation: slideIn 0.5s ease-out;
        }

        .build-header {
            border-left: 4px solid var(--entity-red);
            padding-left: 20px;
            background: linear-gradient(90deg, rgba(217, 4, 41, 0.1) 0%, transparent 100%);
            padding-top: 10px;
            padding-bottom: 10px;
        }
        .build-title {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
            color: white;
            text-shadow: 0 0 15px var(--entity-red-glow);
        }
        .build-subtitle {
            font-size: 1.2rem;
            color: var(--entity-red);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        .meta-tags {
            display: flex;
            gap: 15px;
        }
        .tag {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .tag span { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; margin-right: 5px;}

        .strategy-container {
            background: var(--glass-panel);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            overflow-y: auto; 
            max-height: 400px;
        }
        .strategy-container::-webkit-scrollbar { width: 5px; }
        .strategy-container::-webkit-scrollbar-thumb { background: var(--entity-red); border-radius: 5px; }

        .phase h4 {
            font-family: 'Oswald', sans-serif;
            color: white;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
            margin-bottom: 8px;
        }
        .phase p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #ced4da;
        }
        .pro-tip {
            background: rgba(217, 4, 41, 0.15);
            border-left: 3px solid var(--entity-red);
            padding: 12px;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* The Rhombus Layout */
        .perk-diamond {
            position: relative;
            width: 480px;
            height: 480px;
            margin-bottom: 40px;
            animation: pulseGlow 4s infinite alternate;
        }

        .perk-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 250px; /* Wide enough to hold the name text */
            height: 140px;
        }

       
        .pos-top { 
            top: 0; left: 50%; transform: translateX(-50%); 
            flex-direction: column-reverse; /* Text on top */
        }
        .pos-left { 
            top: 50%; left: -50px; transform: translateY(-50%); /* CHANGED: Pulled outward 50px */
            flex-direction: row-reverse; /* Text on left */
        }
        .pos-right { 
            top: 50%; right: -50px; transform: translateY(-50%); /* CHANGED: Pulled outward 50px */
            flex-direction: row; /* Text on right */
        }
        .pos-bottom { 
            bottom: 0; left: 50%; transform: translateX(-50%); 
            flex-direction: column; /* Text on bottom */
        }

        .perk-slot {
            width: 110px;
            height: 110px;
            background: var(--perk-blur-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--perk-border);
            box-shadow: 0 0 25px rgba(0, 180, 216, 0.2), inset 0 0 15px rgba(0, 180, 216, 0.2);
            transform: rotate(45deg); /* Make it a diamond */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0; /* Prevent squishing */
            transition: all 0.3s;
            z-index: 2;
        }
        .perk-slot img {
            width: 85px;
            height: 85px;
            transform: rotate(-45deg); /* Straighten image */
            filter: drop-shadow(0px 0px 8px rgba(255,255,255,0.4));
        }

        /* Perk Name Text Styling */
        .perk-name-label {
            font-family: 'Oswald', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            text-align: center;
            padding: 10px;
            z-index: 3;
        }

        /* Position-specific label adjustments for spacing */
        .pos-top .perk-name-label { margin-bottom: 15px; }
        .pos-bottom .perk-name-label { margin-top: 15px; }
        .pos-left .perk-name-label { margin-right: 15px; text-align: right; }
        .pos-right .perk-name-label { margin-left: 15px; text-align: left; }

        /* Premium Randomize Button */
        .randomize-btn {
            background: linear-gradient(135deg, var(--entity-red), #800000);
            color: white;
            border: 1px solid #ff4d4d;
            padding: 18px 60px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(217, 4, 41, 0.4), inset 0 2px 5px rgba(255,255,255,0.3);
            border-radius: 2px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .randomize-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .randomize-btn:hover::after { left: 150%; }
        .randomize-btn:hover { transform: scale(1.05); box-shadow: 0 10px 40px rgba(217, 4, 41, 0.6); }
        .randomize-btn:active { transform: scale(0.98); }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 10px rgba(0, 180, 216, 0.1)); }
            to { filter: drop-shadow(0 0 30px rgba(0, 180, 216, 0.3)); }
        }
        .glitch-flash {
            animation: flash 0.3s ease-out;
        }
        @keyframes flash {
            0% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.2; filter: brightness(2) contrast(2); }
            100% { opacity: 1; filter: brightness(1); }
        }
    </style>

        // This function strips out spaces and punctuation to find the exact match in the array above
        function getMatchedImageFile(datasetPerkName) {
            // Simplify the string: lowercase, remove spaces, colons, dashes, apostrophes
            const simplifiedInput = datasetPerkName.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            // Loop through all exact files to find the match
            for (let i = 0; i < exactIconFiles.length; i++) {
                const fileName = exactIconFiles[i];
                const simplifiedFileName = fileName.toLowerCase().replace('iconperks_', '').replace('.webp', '').replace(/[^a-z0-9]/g, '');
                
                if (simplifiedInput === simplifiedFileName) {
                    return fileName; // Found the exact match!
                }
            }
            // Fallback just in case
            return "IconPerks_default.webp"; 
        }

      
        function renderDashboard(build) {
            const dashboard = document.getElementById('main-dashboard');
            
            // Position classes to recreate the DBD Diamond
            const positions = ["pos-top", "pos-left", "pos-right", "pos-bottom"];
            
            // Generate the Perk Diamond HTML
            let perksHTML = '';
            for (let i = 0; i < 4; i++) {
                const perkName = build.perks[i];
                const fileName = getMatchedImageFile(perkName);
                const posClass = positions[i];
                
                perksHTML += `
                    <div class="perk-wrapper ${posClass}">
                        <div class="perk-slot">
                            <img src="DBDperks/${fileName}" alt="${perkName}" onerror="this.style.display='none'">
                        </div>
                        <div class="perk-name-label">${perkName}</div>
                    </div>
                `;
            }

            // Determine recommended killers display
            const killersText = Array.isArray(build.recommendedKillers) 
                ? build.recommendedKillers.join(', ') 
                : build.recommendedKillers;

            // Inject the HTML
            dashboard.innerHTML = `
                <div class="info-panel">
                    <div class="build-header">
                        <h1 class="build-title">${build.name}</h1>
                        <h2 class="build-subtitle">// ${build.subtitle}</h2>
                    </div>

                    <div class="meta-tags">
                        <div class="tag"><span>Playstyle:</span> ${build.playstyle}</div>
                        <div class="tag"><span>Difficulty:</span> ${build.difficulty}</div>
                        <div class="tag"><span>Optimum:</span> ${killersText}</div>
                    </div>

                    <div class="strategy-container">
                        <div class="phase">
                            <h4>Early Game</h4>
                            <p>${build.strategy.earlyGame}</p>
                        </div>
                        <div class="phase">
                            <h4>Mid Game</h4>
                            <p>${build.strategy.midGame}</p>
                        </div>
                        <div class="phase">
                            <h4>End Game</h4>
                            <p>${build.strategy.endGame}</p>
                        </div>
                        <div class="pro-tip">
                            <strong>ENTITY WHISPERS:</strong> ${build.proTip}
                        </div>
                    </div>
                </div>

                <div class="visual-panel">
                    <div class="perk-diamond">
                        ${perksHTML}
                    </div>
                    <button class="randomize-btn" onclick="executeRandomizer()">Next Build</button>
                </div>
            `;
        }

       
        function executeRandomizer() {
            // Apply glitch effect
            const dashboard = document.getElementById('main-dashboard');
            dashboard.classList.remove('glitch-flash');
            void dashboard.offsetWidth; // Trigger reflow
            dashboard.classList.add('glitch-flash');

            // Wait tiny fraction of second for effect, then change data
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * buildDatabase.length);
                renderDashboard(buildDatabase[randomIndex]);
            }, 150);
        }

        // Load initial build on start
        window.onload = executeRandomizer;
    </script>
