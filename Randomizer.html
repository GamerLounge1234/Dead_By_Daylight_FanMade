    <title>The Entity's Terminal - Loadouts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap');

        :root {
            /* Core Theme - Dark Glassmorphic with Blood/Neon Accents */
            --bg-deep: #050608;
            --entity-red: #e63946;
            --entity-blood: #9e0000;
            --entity-glow: rgba(230, 57, 70, 0.4);
            
            /* Ultra-Rare Blue Perks */
            --perk-blue: #00f0ff;
            --perk-blue-dim: rgba(0, 240, 255, 0.15);
            --perk-blue-glow: rgba(0, 240, 255, 0.4);
            
            /* Typography & Panels */
            --text-main: #f8f9fa;
            --text-muted: #8d99ae;
            --glass-bg: rgba(12, 16, 24, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            /* Fog Overlay */
            --fog-overlay: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.04"/></svg>');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 100VH STRICT LOCKED LAYOUT */
        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(158, 0, 0, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 50% 120%, rgba(0, 240, 255, 0.05) 0%, transparent 60%),
                var(--fog-overlay);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* PREMIUM NAVBAR */
        .navbar {
            background: rgba(5, 6, 8, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            height: 8vh;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            z-index: 50;
        }
        
        .nav-links {
            list-style: none;
            display: flex;
            gap: 3vw;
        }
        
        .nav-links li a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: clamp(0.9rem, 1vw, 1.1rem);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-links li a::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 0%; height: 2px;
            background: var(--entity-red); transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--entity-red);
        }
        
        .nav-links li a:hover::after, .nav-links li a.active::after { width: 100%; }
        .nav-links li a:hover, .nav-links li a.active {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* DASHBOARD GRID - Perfect Symmetry */
        .dashboard {
            height: 92vh; /* Remaining height */
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 3vh 4vw;
            gap: 4vw;
            align-items: stretch;
        }

        /* LEFT COLUMN: INFO PANEL */
        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: slideInLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            height: 100%;
        }

        /* HEADER */
        .build-header {
            border-left: 4px solid var(--entity-red);
            padding-left: clamp(15px, 2vw, 25px);
            background: linear-gradient(90deg, rgba(230, 57, 70, 0.1) 0%, transparent 100%);
            padding-top: 1.5vh;
            padding-bottom: 1.5vh;
            flex-shrink: 0;
        }
        
        .build-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.5rem, 4.5vh, 4rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
            color: white;
            text-shadow: 0 0 20px var(--entity-glow), 2px 2px 0px rgba(0,0,0,0.8);
        }
        
        .build-subtitle {
            font-size: clamp(1rem, 1.5vh, 1.2rem);
            color: var(--entity-red);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0.5vh;
        }

        /* META TAGS */
        .meta-tags {
            display: flex;
            gap: 1vw;
            margin-top: 2vh;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        
        .tag {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1vh 1vw;
            border-radius: 2px;
            font-size: clamp(0.8rem, 1.2vh, 0.95rem);
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .tag span { color: var(--perk-blue); text-transform: uppercase; font-size: 0.8em; margin-right: 5px;}

        /* STRATEGY BLOCKS - Dynamic Sizing, NO SCROLLING */
        .strategy-container {
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            flex-grow: 1;
            margin: 3vh 0;
            justify-content: center;
        }
        
        .phase {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-left: 2px solid var(--perk-blue);
            padding: 2vh 1.5vw;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .phase h4 {
            font-family: 'Oswald', sans-serif;
            color: white;
            font-size: clamp(1.1rem, 1.8vh, 1.3rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1vh;
            text-shadow: 0 0 10px var(--perk-blue-glow);
        }
        
        .phase p {
            font-size: clamp(0.9rem, 1.5vh, 1.05rem);
            line-height: 1.5;
            color: #d1d5db;
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Safety net: clamp text to 3 lines max per phase */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* PRO TIP - Bottom anchored */
        .pro-tip {
            background: linear-gradient(90deg, rgba(230, 57, 70, 0.15) 0%, rgba(0,0,0,0.5) 100%);
            border-left: 4px solid var(--entity-red);
            padding: 2vh 1.5vw;
            font-weight: 400;
            font-size: clamp(0.9rem, 1.5vh, 1.05rem);
            color: #fff;
            border-radius: 0 4px 4px 0;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .pro-tip strong {
            color: var(--entity-red);
            letter-spacing: 1px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1em;
        }

        /* RIGHT COLUMN: VISUAL PANEL */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            padding-bottom: 2vh;
            animation: slideInRight 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* PERK DIAMOND LAYOUT - Fully Centered & Responsive */
        .perk-diamond-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .perk-grid-anchor {
            position: relative;
            width: clamp(300px, 40vh, 450px);
            height: clamp(300px, 40vh, 450px);
            animation: floatGlow 6s ease-in-out infinite;
        }

        .perk-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Absolute positioning logic based on a center point */
        .pos-top    { top: 0; left: 50%; transform: translate(-50%, -50%); flex-direction: column-reverse; }
        .pos-bottom { bottom: 0; left: 50%; transform: translate(-50%, 50%); flex-direction: column; }
        .pos-left   { top: 50%; left: 0; transform: translate(-50%, -50%); flex-direction: row-reverse; }
        .pos-right  { top: 50%; right: 0; transform: translate(50%, -50%); flex-direction: row; }

        /* ULTRA RARE BLUE PERK SLOT */
        .perk-slot {
            width: clamp(90px, 12vh, 120px);
            height: clamp(90px, 12vh, 120px);
            background: var(--perk-blue-dim);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--perk-blue-glow);
            box-shadow: 
                0 0 20px rgba(0, 240, 255, 0.2), 
                inset 0 0 20px rgba(0, 240, 255, 0.2),
                0 0 0 1px rgba(255,255,255,0.1);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }
        
        .perk-slot:hover {
            transform: rotate(45deg) scale(1.1);
            border-color: var(--perk-blue);
            box-shadow: 0 0 35px var(--perk-blue-glow), inset 0 0 30px var(--perk-blue-glow);
            z-index: 10;
        }

        .perk-slot img {
            width: 75%;
            height: 75%;
            transform: rotate(-45deg);
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8)) drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        /* LABEL POSITIONING */
        .perk-name-label {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(0.9rem, 1.4vh, 1.15rem);
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 2px 4px #000, 0 0 10px var(--perk-blue), 0 0 20px #000;
            letter-spacing: 1px;
            white-space: nowrap;
            z-index: 3;
            pointer-events: none;
        }
        
        .pos-top .perk-name-label { margin-bottom: 2vh; }
        .pos-bottom .perk-name-label { margin-top: 2vh; }
        .pos-left .perk-name-label { margin-right: 1.5vw; text-align: right; }
        .pos-right .perk-name-label { margin-left: 1.5vw; text-align: left; }

        /* PREMIUM BUTTON */
        .randomize-btn {
            background: linear-gradient(135deg, var(--entity-red), var(--entity-blood));
            color: white;
            border: 1px solid #ff4d4d;
            padding: 2.5vh 4vw;
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1.2rem, 2vh, 1.8rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 10px 30px var(--entity-glow), inset 0 2px 5px rgba(255,255,255,0.4);
            border-radius: 3px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            width: 80%;
            max-width: 450px;
        }
        
        .randomize-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .randomize-btn:hover::after { left: 150%; }
        .randomize-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 40px rgba(230, 57, 70, 0.6), inset 0 2px 5px rgba(255,255,255,0.5); 
        }
        .randomize-btn:active { transform: translateY(2px); }

        /* ANIMATIONS */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes floatGlow {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.1)); }
            50% { transform: translateY(-10px); filter: drop-shadow(0 0 35px rgba(0, 240, 255, 0.25)); }
        }
        .glitch-flash {
            animation: digitalGlitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }
        @keyframes digitalGlitch {
            0% { filter: contrast(1) brightness(1) hue-rotate(0deg); transform: scale(1); opacity: 1; }
            20% { filter: contrast(2) brightness(1.5) hue-rotate(-20deg); transform: scale(0.98) translate(-2px, 2px); opacity: 0.8; }
            40% { filter: contrast(2) brightness(2) hue-rotate(20deg); transform: scale(1.02) translate(2px, -2px); opacity: 0.9; }
            100% { filter: contrast(1) brightness(1) hue-rotate(0deg); transform: scale(1); opacity: 1; }
        }
    </style>

        let currentBuildIndex = 0;

        function getMatchedImageFile(datasetPerkName) {
            const simplifiedInput = datasetPerkName.toLowerCase().replace(/[^a-z0-9]/g, '');
            for (let i = 0; i < exactIconFiles.length; i++) {
                const fileName = exactIconFiles[i];
                const simplifiedFileName = fileName.toLowerCase().replace('iconperks_', '').replace('.webp', '').replace(/[^a-z0-9]/g, '');
                
                if (simplifiedInput === simplifiedFileName) {
                    return fileName;
                }
            }
            return "IconPerks_default.webp"; 
        }

        function renderDashboard(build) {
            const dashboard = document.getElementById('main-dashboard');
            const positions = ["pos-top", "pos-left", "pos-right", "pos-bottom"];
            
            let perksHTML = '';
            for (let i = 0; i < 4; i++) {
                const perkName = build.perks[i] || "Empty Slot";
                const fileName = getMatchedImageFile(perkName);
                const posClass = positions[i];
                
                perksHTML += `
                    <div class="perk-wrapper ${posClass}">
                        <div class="perk-slot">
                            <img src="DBDperks/${fileName}" alt="${perkName}" onerror="this.style.display='none'">
                        </div>
                        <div class="perk-name-label">${perkName}</div>
                    </div>
                `;
            }

            const killersText = Array.isArray(build.recommendedKillers) 
                ? build.recommendedKillers.join(', ') 
                : build.recommendedKillers;

            dashboard.innerHTML = `
                <div class="info-panel">
                    <div class="build-header">
                        <h1 class="build-title">${build.name}</h1>
                        <h2 class="build-subtitle">// ${build.subtitle}</h2>
                    </div>

                    <div class="meta-tags">
                        <div class="tag"><span>Playstyle:</span> ${build.playstyle}</div>
                        <div class="tag"><span>Difficulty:</span> ${build.difficulty}</div>
                        <div class="tag"><span>Optimum:</span> ${killersText}</div>
                    </div>

                    <div class="strategy-container">
                        <div class="phase">
                            <h4>Early Game</h4>
                            <p>${build.strategy.earlyGame}</p>
                        </div>
                        <div class="phase">
                            <h4>Mid Game</h4>
                            <p>${build.strategy.midGame}</p>
                        </div>
                        <div class="phase">
                            <h4>End Game</h4>
                            <p>${build.strategy.endGame}</p>
                        </div>
                    </div>

                    <div class="pro-tip">
                        <strong>ENTITY WHISPERS:</strong> ${build.proTip}
                    </div>
                </div>

                <div class="visual-panel">
                    <div class="perk-diamond-container">
                        <div class="perk-grid-anchor">
                            ${perksHTML}
                        </div>
                    </div>
                    <button class="randomize-btn" onclick="executeSequential()">Next Sequence</button>
                </div>
            `;
        }

        // Strict Sequential Logic 1 to N
        function executeSequential() {
            const dashboard = document.getElementById('main-dashboard');
            
            // Trigger UI Glitch Reset
            dashboard.classList.remove('glitch-flash');
            void dashboard.offsetWidth; 
            dashboard.classList.add('glitch-flash');

            setTimeout(() => {
                // Increment index and modulo by length to guarantee 1 -> 500 looping
                currentBuildIndex = (currentBuildIndex + 1) % buildDatabase.length;
                renderDashboard(buildDatabase[currentBuildIndex]);
            }, 150);
        }

        window.onload = function() {
            currentBuildIndex = 0;
            renderDashboard(buildDatabase[0]);
        };
    </script>
