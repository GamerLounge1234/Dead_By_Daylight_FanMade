<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Entity's Terminal - Loadouts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@400;500;700&display=swap');

        :root {
            --bg-void: #050608;
            --bg-surface: #0a0c11;
            --entity-blood: #ff0a2f;
            --entity-blood-glow: rgba(255, 10, 47, 0.5);
            --entity-blood-dim: rgba(255, 10, 47, 0.15);
            --perk-bg: rgba(12, 16, 24, 0.4);
            --perk-border: rgba(255, 255, 255, 0.15);
            --perk-border-active: rgba(255, 10, 47, 0.6);
            --text-main: #f8f9fa;
            --text-muted: #6c757d;
            --glass-bg: rgba(10, 12, 18, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --fog-noise: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.03"/></svg>');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-void);
            background-image: radial-gradient(circle at 50% 20%, #11141d 0%, var(--bg-void) 80%), var(--fog-noise);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- PREMIUM GLASSMORPHIC NAVBAR --- */
        .navbar {
            background: rgba(5, 6, 8, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 50px;
            display: flex;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            z-index: 100;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 50px;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            padding-bottom: 5px;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--entity-blood);
            transition: all 0.4s ease;
            transform: translateX(-50%);
            box-shadow: 0 0 10px var(--entity-blood-glow);
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .nav-links li a:hover::after, .nav-links li a.active::after {
            width: 100%;
        }

        /* --- MAIN DASHBOARD LAYOUT --- */
        .dashboard {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            padding: 40px 80px;
            gap: 60px;
            height: calc(100vh - 65px);
            align-items: center;
        }

        /* --- LEFT COLUMN: INFO PANEL --- */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
            animation: fadeSlideRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .build-header {
            position: relative;
            padding: 15px 0 15px 25px;
        }

        .build-header::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--entity-blood);
            box-shadow: 0 0 15px var(--entity-blood-glow);
            border-radius: 2px;
        }

        .build-title {
            font-family: 'Oswald', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .build-subtitle {
            font-size: 1.1rem;
            color: var(--entity-blood);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }

        .meta-tags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tag {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tag span { 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            margin-right: 8px;
        }

        .strategy-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.5);
            overflow-y: auto; 
            max-height: 450px;
            position: relative;
        }

        .strategy-container::-webkit-scrollbar { width: 6px; }
        .strategy-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .strategy-container::-webkit-scrollbar-thumb { background: var(--entity-blood-dim); border-radius: 10px; }
        .strategy-container::-webkit-scrollbar-thumb:hover { background: var(--entity-blood); }

        .phase h4 {
            font-family: 'Oswald', sans-serif;
            color: #ffffff;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .phase h4::before {
            content: '>';
            color: var(--entity-blood);
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .phase p {
            font-size: 1rem;
            line-height: 1.7;
            color: #aeb5bc;
            font-weight: 300;
        }

        .pro-tip {
            background: linear-gradient(90deg, var(--entity-blood-dim) 0%, transparent 100%);
            border-left: 3px solid var(--entity-blood);
            padding: 16px 20px;
            border-radius: 0 8px 8px 0;
            font-weight: 400;
            font-size: 0.95rem;
            color: #e2e8f0;
            margin-top: 10px;
        }

        .pro-tip strong {
            font-family: 'Oswald', sans-serif;
            letter-spacing: 2px;
            color: var(--entity-blood);
            margin-right: 8px;
        }

        /* --- RIGHT COLUMN: VISUAL PANEL --- */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: fadeSlideLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .perk-diamond-container {
            position: relative;
            width: 500px;
            height: 500px;
            margin-bottom: 50px;
        }

        /* Subtle rotating background ring to emphasize the AAA feel */
        .perk-diamond-container::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 320px; height: 320px;
            transform: translate(-50%, -50%) rotate(45deg);
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 0 60px rgba(255, 10, 47, 0.05);
            z-index: 0;
            animation: slowRotate 20s linear infinite;
        }

        .perk-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 280px; 
            height: 160px;
            z-index: 10;
        }

        /* Repositioned for a tighter, more precise diamond shape */
        .pos-top { top: -20px; left: 50%; transform: translateX(-50%); flex-direction: column-reverse; }
        .pos-left { top: 50%; left: -60px; transform: translateY(-50%); flex-direction: row-reverse; }
        .pos-right { top: 50%; right: -60px; transform: translateY(-50%); flex-direction: row; }
        .pos-bottom { bottom: -20px; left: 50%; transform: translateX(-50%); flex-direction: column; }

        .perk-slot {
            width: 120px;
            height: 120px;
            background: var(--perk-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--perk-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: crosshair;
        }

        .perk-slot:hover {
            border-color: var(--perk-border-active);
            box-shadow: 0 0 30px var(--entity-blood-glow), inset 0 0 20px var(--entity-blood-dim);
            transform: rotate(45deg) scale(1.08);
        }

        .perk-slot img {
            width: 95px;
            height: 95px;
            transform: rotate(-45deg); 
            filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.9));
            transition: filter 0.3s;
        }

        .perk-slot:hover img {
            filter: drop-shadow(0px 0px 12px rgba(255,255,255,0.5));
        }

        .perk-name-label {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 4px 10px rgba(0,0,0,0.9);
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .perk-wrapper:hover .perk-name-label {
            opacity: 1;
            color: var(--entity-blood);
            text-shadow: 0 0 10px rgba(255, 10, 47, 0.4);
        }

        .pos-top .perk-name-label { margin-bottom: 25px; }
        .pos-bottom .perk-name-label { margin-top: 25px; }
        .pos-left .perk-name-label { margin-right: 25px; text-align: right; }
        .pos-right .perk-name-label { margin-left: 25px; text-align: left; }

        /* --- PREMIUM BUTTON --- */
        .action-btn-container {
            position: relative;
            z-index: 20;
        }

        .randomize-btn {
            background: rgba(10, 12, 18, 0.8);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 16px 50px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .randomize-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--entity-blood-dim), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .randomize-btn:hover {
            border-color: var(--entity-blood);
            box-shadow: 0 0 30px var(--entity-blood-dim);
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        .randomize-btn:hover::before {
            transform: translateX(100%);
        }

        .randomize-btn:active {
            transform: scale(0.96);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeSlideRight {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeSlideLeft {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slowRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .glitch-flash {
            animation: uiGlitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes uiGlitch {
            0% { opacity: 1; filter: saturate(1); transform: scale(1); }
            20% { opacity: 0.8; filter: saturate(2) hue-rotate(-20deg); transform: scale(0.99) translateX(2px); }
            40% { opacity: 0.4; filter: saturate(0) contrast(2); transform: scale(1.01) translateX(-2px); }
            60% { opacity: 0.9; filter: saturate(3) hue-rotate(20deg); transform: scale(1); }
            100% { opacity: 1; filter: saturate(1); transform: scale(1); }
        }
    </style>
</head>

        let currentBuildIndex = 0;

        function getMatchedImageFile(datasetPerkName) {
            const simplifiedInput = datasetPerkName.toLowerCase().replace(/[^a-z0-9]/g, '');
            for (let i = 0; i < exactIconFiles.length; i++) {
                const fileName = exactIconFiles[i];
                const simplifiedFileName = fileName.toLowerCase().replace('iconperks_', '').replace('.webp', '').replace(/[^a-z0-9]/g, '');
                if (simplifiedInput === simplifiedFileName) return fileName;
            }
            return "IconPerks_default.webp"; 
        }

        function renderDashboard(build) {
            const dashboard = document.getElementById('main-dashboard');
            const positions = ["pos-top", "pos-left", "pos-right", "pos-bottom"];
            
            let perksHTML = '';
            for (let i = 0; i < 4; i++) {
                const perkName = build.perks[i];
                const fileName = getMatchedImageFile(perkName);
                const posClass = positions[i];
                
                perksHTML += `
                    <div class="perk-wrapper ${posClass}">
                        <div class="perk-slot">
                            <img src="DBDperks/${fileName}" alt="${perkName}" onerror="this.style.display='none'">
                        </div>
                        <div class="perk-name-label">${perkName}</div>
                    </div>
                `;
            }

            const killersText = Array.isArray(build.recommendedKillers) 
                ? build.recommendedKillers.join(', ') 
                : build.recommendedKillers;

            dashboard.innerHTML = `
                <div class="info-panel">
                    <div class="build-header">
                        <h1 class="build-title">${build.name}</h1>
                        <h2 class="build-subtitle">// ${build.subtitle}</h2>
                    </div>

                    <div class="meta-tags">
                        <div class="tag"><span>Playstyle:</span> ${build.playstyle}</div>
                        <div class="tag"><span>Difficulty:</span> ${build.difficulty}</div>
                        <div class="tag"><span>Optimum:</span> ${killersText}</div>
                    </div>

                    <div class="strategy-container">
                        <div class="phase">
                            <h4>Early Game</h4>
                            <p>${build.strategy.earlyGame}</p>
                        </div>
                        <div class="phase">
                            <h4>Mid Game</h4>
                            <p>${build.strategy.midGame}</p>
                        </div>
                        <div class="phase">
                            <h4>End Game</h4>
                            <p>${build.strategy.endGame}</p>
                        </div>
                        <div class="pro-tip">
                            <strong>ENTITY WHISPERS:</strong> ${build.proTip}
                        </div>
                    </div>
                </div>

                <div class="visual-panel">
                    <div class="perk-diamond-container">
                        ${perksHTML}
                    </div>
                    <div class="action-btn-container">
                        <button class="randomize-btn" onclick="executeSequential()">Initialize Next Sequence</button>
                    </div>
                </div>
            `;
        }

        function executeSequential() {
            const dashboard = document.getElementById('main-dashboard');
            dashboard.classList.remove('glitch-flash');
            void dashboard.offsetWidth; 
            dashboard.classList.add('glitch-flash');

            setTimeout(() => {
                currentBuildIndex++;
                if (currentBuildIndex >= buildDatabase.length) {
                    currentBuildIndex = 0;
                }
                renderDashboard(buildDatabase[currentBuildIndex]);
            }, 200); 
        }

        window.onload = function() {
            currentBuildIndex = 0;
            renderDashboard(buildDatabase[0]);
        };
