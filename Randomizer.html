<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Entity's Terminal - Loadouts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@500;700&display=swap');

        :root {
            /* Core AAA Dark Theme */
            --bg-deep: #030407;
            --entity-red: #ff0a2f;
            --entity-red-glow: rgba(255, 10, 47, 0.6);
            --entity-red-dim: rgba(255, 10, 47, 0.15);
            
            /* Premium Blue Perk Aesthetics */
            --perk-blue-core: #0077b6;
            --perk-blue-glow: rgba(0, 180, 216, 0.5);
            --perk-blue-bg: linear-gradient(135deg, rgba(0, 52, 89, 0.8) 0%, rgba(0, 119, 182, 0.6) 100%);
            --perk-border: #00b4d8;
            
            /* Glassmorphism */
            --glass-bg: rgba(12, 16, 24, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            /* Typography */
            --text-main: #f8f9fa;
            --text-muted: #8b9bb4;
            
            /* Fog Overlay */
            --fog-overlay: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.04"/></svg>');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* STRICT 100VH LOCKED LAYOUT */
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #0a0d14 0%, var(--bg-deep) 100%), var(--fog-overlay);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* ABSOLUTELY NO SCROLLING */
            display: flex;
            flex-direction: column;
        }

        /* PREMIUM GLASSMORPHIC NAVBAR */
        .navbar {
            background: rgba(3, 4, 7, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 3rem;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.9);
            z-index: 50;
            height: 70px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 3rem;
            align-items: center;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--entity-red);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--entity-red-glow);
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        .nav-links li a.active::after {
            width: 100%;
        }

        /* MAIN TWO-COLUMN DASHBOARD */
        .dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 2rem 4rem;
            gap: 3rem;
            height: calc(100vh - 70px);
            align-items: center;
        }

        /* LEFT COLUMN: INFO PANEL */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: slideIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            height: 100%;
            justify-content: center;
        }

        .build-header {
            border-left: 5px solid var(--entity-red);
            padding-left: 1.5rem;
            background: linear-gradient(90deg, var(--entity-red-dim) 0%, transparent 100%);
            padding-top: 1rem;
            padding-bottom: 1rem;
            border-radius: 0 8px 8px 0;
        }

        .build-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            color: white;
            text-shadow: 0 0 20px var(--entity-red-glow);
        }

        .build-subtitle {
            font-size: 1.1rem;
            color: var(--entity-red);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0.5rem;
        }

        .meta-tags {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        .tag span { 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            margin-right: 0.4rem;
        }

        /* NO-SCROLL STRATEGY CONTAINER */
        .strategy-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.4);
            /* Ensure it fits within 100vh */
            max-height: 45vh; 
            overflow: hidden; 
        }

        .phase h4 {
            font-family: 'Oswald', sans-serif;
            color: white;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.3rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }

        .phase h4::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--perk-blue-core);
            margin-right: 10px;
            transform: rotate(45deg);
            box-shadow: 0 0 8px var(--perk-blue-glow);
        }

        .phase p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #bdc6d1;
        }

        .pro-tip {
            background: linear-gradient(90deg, rgba(255, 10, 47, 0.1) 0%, rgba(255, 10, 47, 0.02) 100%);
            border-left: 3px solid var(--entity-red);
            padding: 1rem;
            font-weight: 400;
            font-size: 0.95rem;
            color: #fff;
            border-radius: 0 6px 6px 0;
            margin-top: auto;
        }
        
        .pro-tip strong {
            color: var(--entity-red);
            letter-spacing: 1px;
        }

        /* RIGHT COLUMN: VISUAL PANEL */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        /* Perfected Rhombus Layout */
        .perk-diamond {
            position: relative;
            width: clamp(350px, 40vw, 450px);
            height: clamp(350px, 40vw, 450px);
            animation: floatGlow 6s ease-in-out infinite;
        }

        .perk-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 200px;
            height: 140px;
        }

        /* Mathematical alignment for perfect cross */
        .pos-top { top: 0; left: 50%; transform: translateX(-50%); flex-direction: column-reverse; }
        .pos-bottom { bottom: 0; left: 50%; transform: translateX(-50%); flex-direction: column; }
        .pos-left { top: 50%; left: 0; transform: translateY(-50%); flex-direction: row-reverse; }
        .pos-right { top: 50%; right: 0; transform: translateY(-50%); flex-direction: row; }

        /* Premium Blue Rarity Slot */
        .perk-slot {
            width: clamp(80px, 10vw, 110px);
            height: clamp(80px, 10vw, 110px);
            background: var(--perk-blue-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--perk-border);
            box-shadow: 0 0 25px var(--perk-blue-glow), inset 0 0 20px rgba(0, 119, 182, 0.8);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            border-radius: 8px; /* Slight rounding for AAA feel */
        }

        .perk-slot:hover {
            transform: rotate(45deg) scale(1.1);
            box-shadow: 0 0 40px var(--perk-blue-glow), inset 0 0 30px rgba(0, 119, 182, 1);
            border-color: #fff;
        }

        .perk-slot img {
            width: 75%;
            height: 75%;
            transform: rotate(-45deg);
            filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.6));
            user-select: none;
            -webkit-user-drag: none;
        }

        .perk-name-label {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e2e8f0;
            text-transform: uppercase;
            text-shadow: 0 2px 4px #000, 0 0 10px rgba(0, 180, 216, 0.8);
            letter-spacing: 1px;
            text-align: center;
            padding: 10px;
            z-index: 3;
            width: max-content;
        }

        .pos-top .perk-name-label { margin-bottom: 5px; }
        .pos-bottom .perk-name-label { margin-top: 5px; }
        .pos-left .perk-name-label { margin-right: 15px; }
        .pos-right .perk-name-label { margin-left: 15px; }

        /* Premium Glitch/AAA Button */
        .randomize-btn {
            margin-top: 2rem;
            background: rgba(255, 10, 47, 0.1);
            color: white;
            border: 1px solid var(--entity-red);
            padding: 1rem 4rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--entity-red-dim), inset 0 0 10px var(--entity-red-dim);
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .randomize-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, transparent 0%, var(--entity-red) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .randomize-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }

        .randomize-btn:hover::before { opacity: 1; }
        .randomize-btn:hover::after { left: 150%; }
        .randomize-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 40px var(--entity-red-glow); 
            border-color: #fff;
        }
        .randomize-btn:active { transform: translateY(1px); }

        /* Keyframes */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes floatGlow {
            0% { transform: translateY(0); filter: drop-shadow(0 0 15px var(--perk-blue-dim)); }
            50% { transform: translateY(-10px); filter: drop-shadow(0 0 35px var(--perk-blue-glow)); }
            100% { transform: translateY(0); filter: drop-shadow(0 0 15px var(--perk-blue-dim)); }
        }
        .glitch-flash { animation: uiFlash 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        
        @keyframes uiFlash {
            0% { opacity: 1; filter: contrast(1); }
            20% { opacity: 0; filter: contrast(3) brightness(2) hue-rotate(-50deg); transform: scale(0.98); }
            40% { opacity: 0.8; }
            60% { opacity: 0.2; transform: translateX(5px); }
            80% { opacity: 1; filter: contrast(1.5); }
            100% { opacity: 1; filter: contrast(1); transform: scale(1); }
        }

        /* MEDIA QUERY FOR EXTREME SMALL HEIGHTS TO PREVENT SCROLL */
        @media (max-height: 750px) {
            .build-title { font-size: 2rem; }
            .strategy-container { padding: 1rem; gap: 0.8rem; }
            .perk-diamond { width: 300px; height: 300px; }
            .perk-slot { width: 75px; height: 75px; }
            .randomize-btn { padding: 0.8rem 3rem; font-size: 1.2rem; }
        }
    </style>
</head>

        // Serialized Randomizer Logic
        let currentBuildIndex = 0;

        function getMatchedImageFile(datasetPerkName) {
            const simplifiedInput = datasetPerkName.toLowerCase().replace(/[^a-z0-9]/g, '');
            for (let i = 0; i < exactIconFiles.length; i++) {
                const fileName = exactIconFiles[i];
                const simplifiedFileName = fileName.toLowerCase().replace('iconperks_', '').replace('.webp', '').replace(/[^a-z0-9]/g, '');
                if (simplifiedInput === simplifiedFileName) {
                    return fileName;
                }
            }
            return "IconPerks_default.webp"; 
        }

        function renderDashboard(build) {
            const dashboard = document.getElementById('main-dashboard');
            const positions = ["pos-top", "pos-right", "pos-bottom", "pos-left"]; // Proper cross alignment
            
            let perksHTML = '';
            for (let i = 0; i < 4; i++) {
                const perkName = build.perks[i];
                const fileName = getMatchedImageFile(perkName);
                const posClass = positions[i];
                
                perksHTML += `
                    <div class="perk-wrapper ${posClass}">
                        <div class="perk-slot">
                            <img src="DBDperks/${fileName}" alt="${perkName}" onerror="this.style.display='none'">
                        </div>
                        <div class="perk-name-label">${perkName}</div>
                    </div>
                `;
            }

            const killersText = Array.isArray(build.recommendedKillers) 
                ? build.recommendedKillers.join(', ') 
                : build.recommendedKillers;

            dashboard.innerHTML = `
                <div class="info-panel">
                    <div class="build-header">
                        <h1 class="build-title">${build.name}</h1>
                        <h2 class="build-subtitle">// ${build.subtitle}</h2>
                    </div>

                    <div class="meta-tags">
                        <div class="tag"><span>Playstyle:</span> ${build.playstyle}</div>
                        <div class="tag"><span>Difficulty:</span> ${build.difficulty}</div>
                        <div class="tag"><span>Optimum:</span> ${killersText}</div>
                    </div>

                    <div class="strategy-container">
                        <div class="phase">
                            <h4>Early Game</h4>
                            <p>${build.strategy.earlyGame}</p>
                        </div>
                        <div class="phase">
                            <h4>Mid Game</h4>
                            <p>${build.strategy.midGame}</p>
                        </div>
                        <div class="phase">
                            <h4>End Game</h4>
                            <p>${build.strategy.endGame}</p>
                        </div>
                        <div class="pro-tip">
                            <strong>ENTITY WHISPERS:</strong> ${build.proTip}
                        </div>
                    </div>
                </div>

                <div class="visual-panel">
                    <div class="perk-diamond">
                        ${perksHTML}
                    </div>
                    <button class="randomize-btn" onclick="executeSequential()">Cycle Build</button>
                </div>
            `;
        }

        function executeSequential() {
            const dashboard = document.getElementById('main-dashboard');
            
            // Trigger glitch animation
            dashboard.classList.remove('glitch-flash');
            void dashboard.offsetWidth; // Trigger reflow
            dashboard.classList.add('glitch-flash');

            // Wait for glitch midpoint to swap content
            setTimeout(() => {
                currentBuildIndex++;
                
                // Loops perfectly back to 0 once all N builds have been shown.
                if (currentBuildIndex >= buildDatabase.length) {
                    currentBuildIndex = 0;
                }
                
                renderDashboard(buildDatabase[currentBuildIndex]);
            }, 200);
        }

        // Initialize strictly at index 0 and cycle forward
        window.onload = function() {
            currentBuildIndex = 0;
            renderDashboard(buildDatabase[0]);
        };
    </script>
